<!DOCTYPE html><html lang="ko" data-theme="light"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 마이페이지">

  <!-- Google Fonts & FontAwesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==========================================
       CORE APPLICATION WRAPPER
       (header/sidebar injected by common.js initPage())
       ========================================== -->
  <div class="app-wrapper" id="appWrapper"><header class="header">
      <div class="header-left">
        <a href="02_main.html" class="logo" style="text-decoration:none;">
          <div class="logo-box"><i class="fa-solid fa-cubes"></i></div>
          <span style="margin-left: 0.5rem;">GROUPWARE</span>
        </a>      </div>

      <div class="header-right">
        <button class="icon-btn" onclick="navigateTo('mail')" title="받은 메일함">
          <i class="fa-solid fa-envelope"></i>
          <span class="badge" id="headerMsgBadge" style="display: flex;">4</span>
        </button>
        <button class="icon-btn" onclick="navigateTo('chat')" title="실시간 채팅">
          <i class="fa-solid fa-comment-dots"></i>
          <span class="badge" id="headerChatBadge" style="display: none;">0</span>
        </button>
        <div class="user-dropdown" onclick="navigateTo('mypage')">
          <div class="user-avatar" id="headerAvatar">홍</div>
          <div class="user-details">
            <span class="user-name-text" id="headerName">홍길동</span>
            <span class="user-role-text" id="headerDept">개발팀 · 사원</span>
          </div>
        </div>
        <button class="icon-btn" onclick="doLogout()" title="로그아웃" style="color: var(--color-danger); border-color: rgba(248,113,113,0.2);">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <!-- Main Navigation Body -->
    <div class="main-body" id="mainBody"><aside class="sidebar">
      <ul class="sidebar-menu">
        <li class="sidebar-item" id="menu-dashboard"><a href="02_main.html"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>

        <li class="sidebar-group-label">업무</li>
        <li class="sidebar-item sub" id="menu-calendar"><a href="03_calendar.html"><i class="fa-solid fa-calendar-days"></i> 일정 캘린더</a></li>
        <li class="sidebar-item sub" id="menu-approval"><a href="06_approval.html"><i class="fa-solid fa-signature"></i> 전자결재</a></li>
        <li class="sidebar-item sub" id="menu-notice"><a href="04_notice.html"><i class="fa-solid fa-bullhorn"></i> 공지사항</a></li>
        <li class="sidebar-item sub" id="menu-archive"><a href="05_archive.html"><i class="fa-solid fa-file-shield"></i> 자료실</a></li>

        <li class="sidebar-group-label">조직 · 소통</li>
        <li class="sidebar-item sub" id="menu-org"><a href="07_org.html"><i class="fa-solid fa-sitemap"></i> 조직도</a></li>
        <li class="sidebar-item sub" id="menu-mail"><a href="08_mail.html"><i class="fa-solid fa-paper-plane"></i> 메일함</a></li>
        <li class="sidebar-item sub" id="menu-chat"><a href="13_chat.html"><i class="fa-solid fa-comment-dots"></i> 실시간 채팅</a></li>

        <li class="sidebar-group-label">근태관리</li>
        <li class="sidebar-item sub" id="menu-attendance"><a href="10_attendance.html"><i class="fa-solid fa-clock"></i> 출결 현황</a></li>

        <li class="sidebar-item active" id="menu-mypage"><a href="09_mypage.html"><i class="fa-solid fa-user-gear"></i> 마이페이지</a></li>

        <li class="sidebar-group-label" id="adminGroupLabel" style="display: none;">관리자</li>
        <li class="sidebar-item sub" id="menu-admin" style="display: none;"><a href="11_admin.html"><i class="fa-solid fa-gears"></i> 계정·인사정보 관리</a></li>
        <li class="sidebar-item sub" id="menu-adminAttendance" style="display: none;"><a href="12_admin_attendance.html"><i class="fa-solid fa-user-clock"></i> 직원 출결 관리</a></li>
      </ul>
    </aside>

      <!-- Center Dynamic View Content Area -->
      <main class="view-content">

        <!-- ==========================================
             SCREEN: MY PAGE
             ========================================== -->
        <div class="grid-12">

          <div class="col-4">
            <div class="card" style="text-align: center;">
              <div class="profile-avatar-large" style="width: 100px; height: 100px; font-size: 2.5rem;" id="myAvatar">홍</div>
              <button type="button" class="btn btn-secondary btn-sm" style="margin-top: 0.75rem;" onclick="document.getElementById('myPhotoInput').click()">
                <i class="fa-solid fa-camera"></i> 프로필 사진 변경
              </button>
              <input type="file" id="myPhotoInput" accept="image/*" style="display:none;" onchange="handleProfilePhotoSelect(this)">
              <h2 id="myName" style="margin-top: 0.75rem;">홍길동</h2>
              <p style="color: var(--text-secondary); font-size: 0.85rem;" id="myDeptPosition">개발팀 · 사원</p>
              <div style="margin-top: 1.5rem; text-align: left; font-size: 0.85rem;" class="commute-info-box">
                <div class="commute-row"><span>사번:</span><strong id="myId">20260601</strong></div>
                <div class="commute-row"><span>입사일:</span><strong id="myJoin">2026-06-01</strong></div>
                <div class="commute-row"><span>권한 수준:</span><strong id="myRole">일반 임직원</strong></div>
              </div>
            </div>
          </div>

          <div class="col-8">
            <div class="card">
              <h3 style="margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">개인 정보 수정</h3>

              <form onsubmit="saveMyInfo(event)">
                <div class="form-group">
                  <label class="form-label" for="myPhone">연락처 (전화번호)</label>
                  <input type="text" id="myPhone" class="form-control" required="" value="010-1234-5678">
                </div>

                <div class="form-group">
                  <label class="form-label" for="myEmail">이메일</label>
                  <input type="email" id="myEmail" class="form-control" required="" value="hong@corporation.com">
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">정보 저장</button>
              </form>

              <h3 style="margin-top: 2rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">비밀번호 변경</h3>
              <form onsubmit="changeMyPassword(event)">
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label" for="currentPw">현재 비밀번호</label>
                    <input type="password" id="currentPw" class="form-control" required="" placeholder="현재 비밀번호">
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="newPw">새 비밀번호</label>
                    <input type="password" id="newPw" class="form-control" required="" placeholder="새 비밀번호">
                  </div>
                </div>
                <button type="submit" class="btn btn-secondary">비밀번호 변경</button>
              </form>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div id="toast-container" class="toast-container"></div>

  
  


</body></html>
