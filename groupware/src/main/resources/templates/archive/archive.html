<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자료실 - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 자료실">

  <!-- 구글 폰트 및 폰트어썸 아이콘 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <!-- ==========================================
       핵심 애플리케이션 래퍼 - 헤더/사이드바는 fragments/layout.html 공통 조각 재사용
       ========================================== -->
  <div class="app-wrapper" id="appWrapper">

    <header th:replace="~{fragments/layout :: header}"></header>

    <div class="main-body" id="mainBody">

      <aside th:replace="~{fragments/layout :: sidebar}"></aside>

      <main class="view-content">

        <!-- ==========================================
             화면: 자료실 (좌측 폴더 = 로그인 사용자가 접근 가능한 REPOSITORY 목록,
             우측 표 = 선택된 REPO_ID의 ARCHIVE 게시글 목록 - ArchiveController가 SSR)
             ========================================== -->
        <div class="grid-12">

          <!-- 좌측 폴더 목록 - 링크 클릭 시 GET /archive/list?repoId=... 로 재요청 -->
          <div class="col-3">
            <div class="card" style="padding: 1.25rem;">
              <h4 style="margin-bottom: 1rem; font-size: 0.95rem;">자료 카테고리</h4>
              <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.25rem;">
                <li th:each="repo : ${repositories}">
                  <a class="org-node" th:classappend="${repo.repoId == currentRepoId} ? 'active'"
                     th:href="@{/archive/list(repoId=${repo.repoId})}">
                    <i class="fa-solid" th:classappend="${repo.deptId == null} ? 'fa-folder-open' : 'fa-folder'"></i>
                    <span th:text="${repo.repoName}">자료실</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <!-- 우측 게시글 목록 -->
          <div class="col-9">
            <div class="card">
              <div class="card-header">
                <h3 th:text="${currentRepoName}">자료실</h3>
                <div style="display: flex; gap: 0.5rem;">
                  <!-- 검색창: notice.html과 동일하게 제출(엔터) 시 GET 재요청. 폴더(repoId)는 유지, 페이지는 1로 초기화 -->
                  <form th:action="@{/archive/list}" method="get" style="display:flex;">
                    <input type="hidden" name="repoId" th:value="${currentRepoId}">
                    <input type="text" name="keyword" class="form-control" placeholder="제목/본문 검색..."
                           th:value="${keyword}" style="width: 220px; font-size: 0.85rem;">
                  </form>
                  <button type="button" class="btn btn-primary btn-sm" onclick="openWriteModal()">
                    <i class="fa-solid fa-pen"></i> 글쓰기
                  </button>
                </div>
              </div>

              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>제목</th>
                      <th style="text-align: center; width: 90px;">첨부</th>
                      <th>등록자</th>
                      <th>등록일</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr class="clickable" th:each="a : ${archives}" th:onclick="'viewArchiveDetail(' + ${a.archiveId} + ')'">
                      <td>
                        <i class="fa-solid fa-file-lines" style="color:var(--color-primary); margin-right:0.5rem;"></i>
                        <strong th:text="${a.archiveTitle}">제목</strong>
                      </td>
                      <td style="text-align:center;" th:text="${a.fileCount} + '개'">1개</td>
                      <td th:text="${a.writerDeptName != null ? a.writerName + ' (' + a.writerDeptName + ')' : a.writerName}">작성자</td>
                      <td style="font-family:'Fira Code'; font-size:0.8rem;"
                          th:text="${a.createdAt != null ? #strings.substring(a.createdAt, 0, 10) : ''}">2026-06-30</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(archives)}">
                      <td colspan="4" style="text-align:center; color:var(--text-muted); padding: 2rem 0;">등록된 자료가 없습니다.</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- 페이지네이션: 공지사항과 동일한 그룹(5개) + 이전/다음 화살표 방식 -->
              <div style="display:flex; justify-content:center; align-items:center; gap:0.4rem; margin-top:1rem;" th:if="${totalPages > 1}">
                <a th:if="${groupStart > 1}" th:href="@{/archive/list(repoId=${currentRepoId}, keyword=${keyword}, page=${groupStart - 1})}"
                   class="btn btn-sm btn-secondary" style="min-width:2.2rem; text-align:center;">‹</a>

                <a th:each="p : ${#numbers.sequence(groupStart, groupEnd)}"
                   th:href="@{/archive/list(repoId=${currentRepoId}, keyword=${keyword}, page=${p})}"
                   th:text="${p}"
                   th:classappend="${p == currentPage} ? 'btn-primary' : 'btn-secondary'"
                   class="btn btn-sm" style="min-width:2.2rem; text-align:center;">1</a>

                <a th:if="${groupEnd < totalPages}" th:href="@{/archive/list(repoId=${currentRepoId}, keyword=${keyword}, page=${groupEnd + 1})}"
                   class="btn btn-sm btn-secondary" style="min-width:2.2rem; text-align:center;">›</a>
              </div>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <!-- ==========================================
       동적 모달 - 상세/작성 기능은 다음 단계에서 구현 예정.
       지금은 목록(SSR) 단계까지만이라 마크업만 남겨두고 동작은 아직 없음.
       ========================================== -->
  <div class="modal-overlay" id="modalOverlay">

    <div class="modal-content" id="modal-archive-detail" style="display:none;">
      <div class="modal-header">
        <h3 id="mArchiveTitle">게시글 제목</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div style="font-size: 0.8rem; color: var(--text-muted); display:flex; justify-content:space-between; margin-bottom: 1rem;">
          <span>등록자: <strong id="mArchiveWriter" style="color:var(--text-secondary);">-</strong></span>
          <span>등록일: <strong id="mArchiveDate" style="color:var(--text-secondary);">-</strong></span>
        </div>
        <div id="mArchiveContent" style="font-size: 0.95rem; white-space: pre-wrap; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem;">
          내용...
        </div>
        <div style="border-top:1px solid var(--border-color); padding-top:1rem;">
          <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">첨부파일</div>
          <div id="mArchiveFileList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="mArchiveDeleteBtn" style="display:none; margin-right:auto;" onclick="deleteArchive()">삭제</button>
        <button class="btn btn-secondary" id="mArchiveEditBtn" style="display:none;" onclick="openEditArchiveModal()">수정</button>
        <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      </div>
    </div>

    <!-- 자료 작성/수정 공용 모달 - "글쓰기" 버튼(신규) 또는 상세 모달의 "수정" 버튼(기존 글)으로 연다.
         수정 모드에서는 첨부파일 교체를 지원하지 않아 파일 선택 영역을 숨긴다(ArchiveService.updateArchive 참고) -->
    <div class="modal-content" id="modal-archive-write" style="display:none;">
      <div class="modal-header">
        <h3 id="archiveWriteModalTitle">자료 게시글 등록</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form onsubmit="submitArchivePost(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="aWriteTitle">제목</label>
            <input type="text" id="aWriteTitle" class="form-control" required placeholder="게시글 제목을 입력하세요">
          </div>
          <div class="form-group">
            <label class="form-label" for="aWriteContent">내용</label>
            <textarea id="aWriteContent" class="form-control" required placeholder="자료에 대한 설명을 입력하세요"></textarea>
          </div>
          <div class="form-group" id="aFileUploadSection">
            <label class="form-label">첨부파일 (여러 개 선택 가능, 선택 안 해도 됨)</label>
            <div style="border: 2px dashed var(--border-color); border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; color: var(--text-secondary);" onclick="document.getElementById('archiveFileInput').click()">
              <i class="fa-solid fa-cloud-arrow-up" style="font-size: 1.5rem; color: var(--color-primary); margin-bottom: 0.5rem;"></i>
              <div>클릭해서 파일 선택</div>
              <div style="font-size: 0.75rem; color:var(--text-muted); margin-top:0.25rem;">파일 1개당 최대 10MB</div>
              <input type="file" id="archiveFileInput" multiple style="display:none;" onchange="handleArchiveFileSelect(this)">
            </div>
            <div id="aSelectedFileList" style="margin-top: 0.5rem; display:flex; flex-direction:column; gap:0.35rem;"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="aWriteSubmitBtn">등록</button>
        </div>
      </form>
    </div>

  </div>

  <!-- 토스트 알림 컨테이너 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 서버가 이미 계산한 값 - 자료 작성은 지금 선택된 폴더(REPO_ID) 기준,
       수정/삭제 버튼 노출은 "관리자이거나 작성자 본인" 여부로 판단 (실제 처리는 서버가 다시 검증) -->
  <script th:inline="javascript">
    const currentRepoId = /*[[${currentRepoId}]]*/ 0;
    const currentEmployeeId = /*[[${employee.employeeId}]]*/ 0;
    const isAdmin = /*[[${employee.employeeRole == 'ADMIN'}]]*/ false;
  </script>
  <script th:src="@{/js/common.js}"></script>
  <script th:src="@{/js/archive.js}"></script>
</body>
</html>
